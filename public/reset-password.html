<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password | Creatorrr</title>
  <meta
    name="description"
    content="Set a new password for your Creatorrr account."
  />
  <style>
    :root {
      --bg: #060606;
      --bg-soft: #0d0d0d;
      --card: rgba(255, 255, 255, 0.04);
      --card-strong: rgba(255, 255, 255, 0.06);
      --text: #f5f5f5;
      --muted: rgba(245, 245, 245, 0.74);
      --muted-2: rgba(245, 245, 245, 0.56);
      --line: rgba(247, 213, 106, 0.18);
      --line-soft: rgba(255, 255, 255, 0.08);
      --gold-1: #f7d56a;
      --gold-2: #b8892a;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      --radius-lg: 24px;
      --max: 720px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(1000px 600px at 82% -10%, rgba(247, 213, 106, 0.08), transparent 60%),
        radial-gradient(900px 520px at 8% 0%, rgba(184, 137, 42, 0.08), transparent 55%),
        linear-gradient(180deg, #050505 0%, #080808 35%, #050505 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      background: rgba(6, 6, 6, 0.74);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 74px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.2px;
      min-width: 0;
    }

    .brand img {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      line-height: 1.04;
      min-width: 0;
    }

    .brand-copy small {
      font-size: 11px;
      color: var(--muted-2);
      font-weight: 650;
      letter-spacing: 0.28px;
      text-transform: uppercase;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 14px;
      font-weight: 760;
      transition: transform 0.18s ease, opacity 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      color: #0b0b0b;
      background: linear-gradient(180deg, var(--gold-1), var(--gold-2));
      box-shadow: 0 14px 30px rgba(184, 137, 42, 0.20);
    }

    .btn-secondary {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.16);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    }

    .btn[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none !important;
    }

    main {
      padding: 56px 0 72px;
    }

    .card {
      background: linear-gradient(180deg, var(--card-strong), var(--card));
      border: 1px solid var(--line-soft);
      box-shadow: var(--shadow);
      border-radius: var(--radius-lg);
      padding: 30px;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 10px;
      color: rgba(247, 213, 106, 0.95);
      font-size: 12px;
      font-weight: 760;
      letter-spacing: 0.22px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 5vw, 52px);
      line-height: 0.98;
      letter-spacing: -1.3px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.58;
      font-size: 15px;
    }

    .form-wrap {
      margin-top: 24px;
    }

    label {
      display: block;
      margin-bottom: 14px;
      font-size: 13px;
      font-weight: 650;
      color: var(--text);
    }

    input {
      width: 100%;
      margin-top: 6px;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: rgba(247, 213, 106, 0.42);
      box-shadow: 0 0 0 3px rgba(247, 213, 106, 0.08);
    }

    .form-actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .helper {
      margin-top: 10px;
      color: var(--muted-2);
      font-size: 13px;
      line-height: 1.5;
    }

    .status-box,
    .error-box,
    .success-box {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .status-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
    }

    .error-box {
      background: rgba(255, 90, 90, 0.08);
      border: 1px solid rgba(255, 90, 90, 0.20);
      color: #ffd6d6;
    }

    .success-box {
      background: rgba(90, 200, 120, 0.09);
      border: 1px solid rgba(90, 200, 120, 0.20);
      color: #daf7de;
    }

    @media (max-width: 760px) {
      .nav {
        min-height: auto;
        padding: 14px 0;
        flex-wrap: wrap;
      }

      .nav-actions,
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="./index.html">
        <img src="./creatorrr-logo_only_32x32.png" alt="Creatorrr logo" onerror="this.src='./creatorrr-logo.png'">
        <span class="brand-copy">
          <span>Creatorrr</span>
          <small>From creators, for creators</small>
        </span>
      </a>

      <div class="nav-actions">
        <a class="btn btn-secondary" href="./get-started.html?intent=login">Back to login</a>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="card">
        <span class="eyebrow">Account recovery</span>
        <h1>Set a new password</h1>
        <p>
          Enter your new password below. After the reset succeeds, go back and log in with the same email and your new password.
        </p>

        <div class="form-wrap" id="form-wrap">
          <label>
            New password
            <input id="password" type="password" autocomplete="new-password" minlength="8" />
          </label>

          <label>
            Confirm new password
            <input id="password-confirm" type="password" autocomplete="new-password" minlength="8" />
          </label>

          <div class="form-actions" id="form-actions">
            <button class="btn btn-primary" id="reset-btn" type="button">Reset password</button>
            <a class="btn btn-secondary" href="./get-started.html?intent=login">Back to login</a>
          </div>

          <div class="helper">
            Minimum password length: 8 characters.
          </div>
        </div>

        <div class="status-box" id="status-box"></div>
        <div class="error-box" id="error-box"></div>
        <div class="success-box" id="success-box"></div>
      </section>
    </div>
  </main>

  <script>
    const API_BASE = "https://api.creatorrr.com";

    const params = new URLSearchParams(window.location.search);
    const token = (params.get("token") || "").trim();

    const passwordEl = document.getElementById("password");
    const passwordConfirmEl = document.getElementById("password-confirm");
    const resetBtn = document.getElementById("reset-btn");
    const formWrap = document.getElementById("form-wrap");
    const formActions = document.getElementById("form-actions");

    const statusBox = document.getElementById("status-box");
    const errorBox = document.getElementById("error-box");
    const successBox = document.getElementById("success-box");

    function setStatus(text) {
      statusBox.textContent = text;
      statusBox.style.display = text ? "block" : "none";
    }

    function setError(text) {
      errorBox.innerHTML = text ? text : "";
      errorBox.style.display = text ? "block" : "none";
    }

    function setSuccess(text) {
      successBox.innerHTML = text ? text : "";
      successBox.style.display = text ? "block" : "none";
    }

    function clearMessages() {
      setStatus("");
      setError("");
      setSuccess("");
    }

    function setBusy(isBusy) {
      resetBtn.disabled = isBusy;
    }

    async function safeReadJson(res) {
      const text = await res.text().catch(() => "");
      if (!text) return {};
      try {
        return JSON.parse(text);
      } catch {
        return { raw: text };
      }
    }

    async function resetPassword() {
      clearMessages();

      const password = String(passwordEl.value || "");
      const passwordConfirm = String(passwordConfirmEl.value || "");

      if (!token) {
        setError(`Missing reset token in URL. <a href="./get-started.html?intent=login">Go back and request a new reset link.</a>`);
        return;
      }

      if (!password || !passwordConfirm) {
        setError("Please enter and confirm your new password.");
        return;
      }

      if (password.length < 8) {
        setError("Password must be at least 8 characters.");
        return;
      }

      if (password !== passwordConfirm) {
        setError("Passwords do not match.");
        return;
      }

      setBusy(true);
      setStatus("Resetting password...");

      try {
        const res = await fetch(`${API_BASE}/auth/reset-password`, {
          method: "POST",
          headers: {
            "content-type": "application/json"
          },
          body: JSON.stringify({
            token,
            password
          })
        });

        const data = await safeReadJson(res);

        if (!res.ok) {
          throw new Error(data?.error || data?.message || `Request failed: ${res.status}`);
        }

        setStatus("");
        setSuccess(`Password reset successful.<br><br><a class="btn btn-primary" href="./get-started.html?intent=login">Go to login</a>`);
        formWrap.style.opacity = "0.72";
        resetBtn.disabled = true;
        passwordEl.disabled = true;
        passwordConfirmEl.disabled = true;
      } catch (err) {
        setStatus("");
        setError(err instanceof Error ? err.message : "Could not reset password.");
      } finally {
        setBusy(false);
      }
    }

    resetBtn.addEventListener("click", resetPassword);

    passwordEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        resetPassword();
      }
    });

    passwordConfirmEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        resetPassword();
      }
    });

    if (!token) {
      setError(`This reset link is missing a token. <a href="./get-started.html?intent=login">Go back and request a new reset link.</a>`);
      formWrap.style.display = "none";
    } else {
      window.setTimeout(() => passwordEl.focus(), 0);
    }
  </script>
</body>
</html>
