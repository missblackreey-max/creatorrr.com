<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password | Creatorrr</title>
  <meta
    name="description"
    content="Set a new password for your Creatorrr account."
  />
  <style>
    :root {
      --bg: #060606;
      --bg-soft: #0d0d0d;
      --card: rgba(255, 255, 255, 0.04);
      --card-strong: rgba(255, 255, 255, 0.06);
      --text: #f5f5f5;
      --muted: rgba(245, 245, 245, 0.74);
      --muted-2: rgba(245, 245, 245, 0.56);
      --line: rgba(247, 213, 106, 0.18);
      --line-soft: rgba(255, 255, 255, 0.08);
      --gold-1: #f7d56a;
      --gold-2: #b8892a;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      --radius-lg: 24px;
      --max: 720px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(1000px 600px at 82% -10%, rgba(247, 213, 106, 0.08), transparent 60%),
        radial-gradient(900px 520px at 8% 0%, rgba(184, 137, 42, 0.08), transparent 55%),
        linear-gradient(180deg, #050505 0%, #080808 35%, #050505 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      background: rgba(6, 6, 6, 0.74);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 74px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.2px;
      min-width: 0;
    }

    .brand img {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      line-height: 1.04;
      min-width: 0;
    }

    .brand-copy small {
      font-size: 11px;
      color: var(--muted-2);
      font-weight: 650;
      letter-spacing: 0.28px;
      text-transform: uppercase;
    }

    .header-action-slot {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-width: 290px;
      min-height: 46px;
      margin-left: auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 14px;
      font-weight: 760;
      transition: transform 0.18s ease, opacity 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn.header-chip {
      min-height: 36px;
      padding: 0 12px;
      font-size: 14px;
      font-weight: 720;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      color: #0b0b0b;
      background: linear-gradient(180deg, var(--gold-1), var(--gold-2));
      box-shadow: 0 14px 30px rgba(184, 137, 42, 0.20);
    }

    .btn-secondary {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.16);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    }

    .header-action-slot .header-chip {
      border-color: rgba(255, 255, 255, 0.2);
      color: #f4f4f6;
      background: linear-gradient(180deg, rgba(18, 20, 24, 0.95), rgba(9, 10, 12, 0.92));
      box-shadow: 0 7px 18px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(247, 213, 106, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }

    .header-action-slot .header-chip:hover {
      border-color: rgba(247, 213, 106, 0.48);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.44), 0 0 0 1px rgba(247, 213, 106, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.26);
    }

    .btn[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none !important;
    }

    main {
      padding: 56px 0 72px;
    }

    .card {
      background: linear-gradient(180deg, var(--card-strong), var(--card));
      border: 1px solid var(--line-soft);
      box-shadow: var(--shadow);
      border-radius: var(--radius-lg);
      padding: 30px;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 10px;
      color: rgba(247, 213, 106, 0.95);
      font-size: 12px;
      font-weight: 760;
      letter-spacing: 0.22px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 5vw, 52px);
      line-height: 0.98;
      letter-spacing: -1.3px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.58;
      font-size: 15px;
    }

    .form-wrap {
      margin-top: 24px;
    }

    label {
      display: block;
      margin-bottom: 14px;
      font-size: 13px;
      font-weight: 650;
      color: var(--text);
    }

    input {
      width: 100%;
      margin-top: 6px;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    .password-field {
      position: relative;
      margin-top: 6px;
    }

    .password-field input {
      margin-top: 0;
      padding-right: 52px;
    }

    .password-toggle {
      position: absolute;
      top: 50%;
      right: 6px;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted-2);
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .password-toggle:hover {
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }

    .password-toggle:focus-visible {
      outline: 2px solid rgba(247, 213, 106, 0.65);
      outline-offset: 2px;
      color: var(--text);
    }

    .password-toggle svg {
      width: 20px;
      height: 20px;
      display: block;
      pointer-events: none;
    }

    .password-toggle .icon-eye-off {
      display: none;
    }

    .password-toggle[aria-pressed="true"] .icon-eye {
      display: none;
    }

    .password-toggle[aria-pressed="true"] .icon-eye-off {
      display: block;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    input:focus,
    .password-field:focus-within input {
      border-color: rgba(247, 213, 106, 0.42);
      box-shadow: 0 0 0 3px rgba(247, 213, 106, 0.08);
    }

    .form-actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .helper {
      margin-top: 10px;
      color: var(--muted-2);
      font-size: 13px;
      line-height: 1.5;
    }

    .token-info {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .status-box,
    .error-box,
    .success-box {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .status-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
    }

    .error-box {
      background: rgba(255, 90, 90, 0.08);
      border: 1px solid rgba(255, 90, 90, 0.20);
      color: #ffd6d6;
    }

    .success-box {
      background: rgba(90, 200, 120, 0.09);
      border: 1px solid rgba(90, 200, 120, 0.20);
      color: #daf7de;
    }

    @media (max-width: 760px) {
      .nav {
        min-height: auto;
        padding: 14px 0;
        flex-wrap: wrap;
      }

      .btn {
        width: 100%;
      }

      .header-action-slot {
        width: auto;
        min-width: 0;
        min-height: 36px;
      }

      .header-action-slot .btn {
        width: auto;
        min-height: 38px;
        padding: 0 14px;
        font-size: 13px;
      }

      .header-action-slot .btn.header-chip {
        min-height: 36px;
        padding: 0 12px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="./index.html">
        <img src="./creatorrr-logo_only_32x32.png" alt="Creatorrr logo" onerror="this.onerror=null;this.src='./creatorrr-logo.png'">
        <span class="brand-copy">
          <span>Creatorrr</span>
          <small>From creators, for creators</small>
        </span>
      </a>

      <div class="header-action-slot">
        <a class="btn btn-secondary header-chip" href="./account.html?intent=login">Back to login</a>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="card">
        <span class="eyebrow">Account recovery</span>
        <h1>Set a new password</h1>
        <p>Use your email reset link to create a new password.</p>

        <div class="token-info" id="token-info">Checking reset link token…</div>

        <div class="form-wrap" id="form-wrap">
          <div id="password-fields">
            <label>
              New password
              <div class="password-field">
                <input id="password" type="password" autocomplete="new-password" minlength="8" />
                <button class="password-toggle" type="button" data-password-toggle data-target="password" aria-label="Show password" aria-pressed="false">
                  <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1.5 12s3.8-6.5 10.5-6.5S22.5 12 22.5 12s-3.8 6.5-10.5 6.5S1.5 12 1.5 12Z"></path>
                    <circle cx="12" cy="12" r="3.25"></circle>
                  </svg>
                  <svg class="icon-eye-off" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 3l18 18"></path>
                    <path d="M10.6 6.2A9.9 9.9 0 0 1 12 6c6.7 0 10.5 6 10.5 6a17.2 17.2 0 0 1-4 4.8"></path>
                    <path d="M6.7 6.7C3.7 8.5 1.5 12 1.5 12s3.8 6.5 10.5 6.5c1.8 0 3.5-.4 4.9-1.1"></path>
                    <path d="M9.9 9.9a3.25 3.25 0 0 0 4.2 4.2"></path>
                  </svg>
                  <span class="sr-only">Show password</span>
                </button>
              </div>
            </label>

            <label>
              Confirm new password
              <div class="password-field">
                <input id="password-confirm" type="password" autocomplete="new-password" minlength="8" />
                <button class="password-toggle" type="button" data-password-toggle data-target="password-confirm" aria-label="Show password" aria-pressed="false">
                  <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1.5 12s3.8-6.5 10.5-6.5S22.5 12 22.5 12s-3.8 6.5-10.5 6.5S1.5 12 1.5 12Z"></path>
                    <circle cx="12" cy="12" r="3.25"></circle>
                  </svg>
                  <svg class="icon-eye-off" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 3l18 18"></path>
                    <path d="M10.6 6.2A9.9 9.9 0 0 1 12 6c6.7 0 10.5 6 10.5 6a17.2 17.2 0 0 1-4 4.8"></path>
                    <path d="M6.7 6.7C3.7 8.5 1.5 12 1.5 12s3.8 6.5 10.5 6.5c1.8 0 3.5-.4 4.9-1.1"></path>
                    <path d="M9.9 9.9a3.25 3.25 0 0 0 4.2 4.2"></path>
                  </svg>
                  <span class="sr-only">Show password</span>
                </button>
              </div>
            </label>

            <div class="helper">
              Minimum password length: 8 characters.
            </div>
          </div>

          <div class="status-box" id="status-box"></div>
          <div class="error-box" id="error-box"></div>
          <div class="success-box" id="success-box"></div>

          <div class="form-actions" id="form-actions">
            <button class="btn btn-primary" id="reset-btn" type="button" disabled>Set new password</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const API_BASE = "https://api.creatorrr.com";

    const params = new URLSearchParams(window.location.search);
    const token = (params.get("token") || "").trim();

    const passwordEl = document.getElementById("password");
    const passwordConfirmEl = document.getElementById("password-confirm");
    const passwordToggles = Array.from(document.querySelectorAll("[data-password-toggle]"));
    const resetBtn = document.getElementById("reset-btn");
    const tokenInfo = document.getElementById("token-info");
    const formWrap = document.getElementById("form-wrap");
    const passwordFields = document.getElementById("password-fields");
    const statusBox = document.getElementById("status-box");
    const errorBox = document.getElementById("error-box");
    const successBox = document.getElementById("success-box");

    let resetCompleted = false;

    function setStatus(text) {
      statusBox.textContent = text;
      statusBox.style.display = text ? "block" : "none";
    }

    function setError(text) {
      errorBox.innerHTML = text ? text : "";
      errorBox.style.display = text ? "block" : "none";
    }

    function setSuccess(text) {
      successBox.innerHTML = text ? text : "";
      successBox.style.display = text ? "block" : "none";
    }

    function clearMessages() {
      setStatus("");
      setError("");
      setSuccess("");
    }

    function setBusy(isBusy) {
      resetBtn.disabled = isBusy;
    }

    function showResetSuccessState() {
      resetCompleted = true;
      tokenInfo.textContent = "Your password was updated successfully.";
      passwordFields.style.display = "none";
      setStatus("");
      setError("");
      setSuccess("Password reset successful.");
      resetBtn.disabled = false;
      resetBtn.textContent = "Back to login";
    }

    async function safeReadJson(res) {
      const text = await res.text().catch(() => "");
      if (!text) return {};
      try {
        return JSON.parse(text);
      } catch {
        return { raw: text };
      }
    }

    function syncPasswordToggle(button, input) {
      const isVisible = input.type === "text";
      const actionLabel = isVisible ? "Hide password" : "Show password";
      button.setAttribute("aria-pressed", String(isVisible));
      button.setAttribute("aria-label", actionLabel);
      const srOnlyText = button.querySelector(".sr-only");
      if (srOnlyText) srOnlyText.textContent = actionLabel;
    }

    passwordToggles.forEach((button) => {
      const targetId = button.dataset.target;
      const input = targetId ? document.getElementById(targetId) : null;
      if (!(input instanceof HTMLInputElement)) return;

      syncPasswordToggle(button, input);
      button.addEventListener("click", () => {
        const selectionStart = input.selectionStart;
        const selectionEnd = input.selectionEnd;
        input.type = input.type === "password" ? "text" : "password";
        syncPasswordToggle(button, input);
        input.focus({ preventScroll: true });
        if (typeof selectionStart === "number" && typeof selectionEnd === "number") {
          input.setSelectionRange(selectionStart, selectionEnd);
        }
      });
    });

    async function resetPassword() {
      if (resetCompleted) {
        window.location.href = "./account.html?intent=login";
        return;
      }

      clearMessages();

      const password = String(passwordEl.value || "");
      const passwordConfirm = String(passwordConfirmEl.value || "");

      if (!token) {
        setError(`Missing reset token in URL. <a href="./account.html?intent=login">Go back and request a new reset link.</a>`);
        return;
      }

      if (!password || !passwordConfirm) {
        setError("Please enter and confirm your new password.");
        return;
      }

      if (password.length < 8) {
        setError("Password must be at least 8 characters.");
        return;
      }

      if (password !== passwordConfirm) {
        setError("Passwords do not match.");
        return;
      }

      setBusy(true);
      setStatus("Resetting password...");

      try {
        const res = await fetch(`${API_BASE}/auth/reset-password`, {
          method: "POST",
          headers: {
            "content-type": "application/json"
          },
          body: JSON.stringify({
            token,
            password
          })
        });

        const data = await safeReadJson(res);

        if (!res.ok) {
          throw new Error(data?.error || data?.message || `Request failed: ${res.status}`);
        }

        passwordEl.disabled = true;
        passwordConfirmEl.disabled = true;
        showResetSuccessState();
      } catch (err) {
        setStatus("");
        setError(err instanceof Error ? err.message : "Could not reset password.");
      } finally {
        setBusy(false);
      }
    }

    resetBtn.addEventListener("click", resetPassword);

    passwordEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        resetPassword();
      }
    });

    passwordConfirmEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        resetPassword();
      }
    });

    if (!token) {
      tokenInfo.textContent = "This reset link is invalid or incomplete.";
      setError(`This reset link is missing a token. <a href="./account.html?intent=login">Go back and request a new reset link.</a>`);
      formWrap.style.display = "none";
      resetBtn.disabled = true;
    } else {
      tokenInfo.textContent = "Reset link verified. Enter and confirm your new password.";
      resetBtn.disabled = false;
      window.setTimeout(() => passwordEl.focus(), 0);
    }
  </script>
</body>
</html>
