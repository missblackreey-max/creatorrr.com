<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Address Confirmed | creatorrr.com</title>
  <link rel="icon" type="image/png" href="./creatorrr-logo-nolink.png" sizes="790x790" />
  <link rel="apple-touch-icon" href="./creatorrr-logo-nolink.png" />
  <meta name="description" content="Your creatorrr.com updates email address has been confirmed." />
  <style>
    :root {
      --text: #f5f5f5;
      --muted: rgba(245, 245, 245, 0.74);
      --muted-2: rgba(245, 245, 245, 0.56);
      --gold-1: #f7d56a;
      --gold-2: #b8892a;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(900px 520px at 82% -10%, rgba(247, 213, 106, 0.1), transparent 60%),
        radial-gradient(760px 460px at 10% 0%, rgba(184, 137, 42, 0.12), transparent 55%),
        linear-gradient(180deg, #050505 0%, #080808 45%, #050505 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    main {
      width: min(calc(100% - 32px), 620px);
      padding: 34px;
      border: 1px solid rgba(247, 213, 106, 0.18);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.035));
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      text-align: center;
    }

    img {
      width: 58px;
      height: 58px;
      margin: 0 auto 18px;
      object-fit: contain;
      border-radius: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 6vw, 46px);
      line-height: 1.04;
      letter-spacing: -1.2px;
    }

    p {
      margin: 14px auto 0;
      max-width: 46ch;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: var(--text);
      font-size: 14px;
      font-weight: 760;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    }

    .btn-primary {
      color: #0b0b0b;
      border-color: rgba(247, 213, 106, 0.44);
      background: linear-gradient(180deg, var(--gold-1), var(--gold-2));
    }

    .subtle-link {
      display: inline-flex;
      margin-top: 18px;
      color: var(--muted-2);
      font-size: 13px;
      font-weight: 680;
    }

    .subtle-link:hover,
    .btn:hover {
      color: var(--gold-1);
    }

    .btn-primary:hover {
      color: #0b0b0b;
    }
  </style>
</head>
<body>
  <main>
    <img src="./creatorrr-logo-nolink.png" alt="Creatorrr logo" onerror="this.onerror=null;this.src='./creatorrr-logo.png'" />
    <h1>Email Address Confirmed!</h1>
    <p>You are on the creatorrr.com updates list.</p>
    <div class="actions">
      <a class="btn btn-primary" href="./">Back to creatorrr.com</a>
      <a class="btn" href="./challenge/">Take the challenge</a>
    </div>
    <a class="subtle-link" href="https://www.reddit.com/r/CreatorrrHub/" target="_blank" rel="noopener noreferrer">Join r/CreatorrrHub on Reddit</a>
  </main>
</body>
</html>
