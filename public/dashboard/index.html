<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MV8HQZJYQV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    gtag('js', new Date());

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Founder Dashboard | Creatorrr</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <link rel="icon" type="image/png" href="../creatorrr-logo-nolink.png" sizes="790x790" />
  <style>
    :root {
      --bg: #060606;
      --card: rgba(255, 255, 255, 0.05);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f5f5f5;
      --muted: rgba(245, 245, 245, 0.72);
      --gold-1: #f7d56a;
      --gold-2: #b8892a;
      --green: #5fcf8a;
      --red: #ff7d7d;
      --max: 1120px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(1000px 600px at 82% -10%, rgba(247, 213, 106, 0.08), transparent 60%),
        radial-gradient(900px 520px at 8% 0%, rgba(184, 137, 42, 0.08), transparent 55%),
        linear-gradient(180deg, #050505 0%, #080808 35%, #050505 100%);
      min-height: 100vh;
    }

    .wrap {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
      padding: 28px 0 44px;
      display: grid;
      gap: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
    }

    .brand img {
      width: 38px;
      height: 38px;
      border-radius: 8px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    a { color: inherit; text-decoration: none; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      border-radius: 999px;
      min-height: 38px;
      padding: 0 14px;
      color: var(--text);
      text-decoration: none;
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.18s ease, border-color 0.18s ease;
      white-space: nowrap;
      font-family: inherit;
    }

    .btn.secondary {
      border-color: rgba(255,255,255,0.28);
      background: linear-gradient(180deg, rgba(18,20,24,0.92), rgba(10,11,13,0.9));
      box-shadow: 0 8px 18px rgba(0,0,0,0.34), inset 0 1px 0 rgba(255,255,255,0.18);
      font-size: 13px;
    }

    .btn.secondary:hover {
      border-color: rgba(247,213,106,0.5);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.primary {
      color: #0b0b0b;
      background: linear-gradient(180deg, var(--gold-1), var(--gold-2));
    }

    .card {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
    }

    .muted { color: var(--muted); }

    .status {
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .status.ok { color: var(--green); }
    .status.err { color: var(--red); }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .kpi {
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      display: grid;
      gap: 6px;
    }

    .kpi-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--muted);
    }

    .kpi-value {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.1;
    }

    @media (max-width: 960px) {
      .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .section-head h2 { margin: 0; }

    .range-tabs {
      display: inline-flex;
      gap: 6px;
      padding: 4px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
    }

    .range-tab {
      min-height: 32px;
      padding: 0 12px;
      border: 0;
      border-radius: 999px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
    }

    .range-tab.active {
      color: #080808;
      background: linear-gradient(180deg, var(--gold-1), var(--gold-2));
    }

    .chart-card {
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
    }

    .chart-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .traffic-chart {
      width: 100%;
      height: 260px;
      display: block;
      overflow: visible;
    }

    .chart-grid-line { stroke: rgba(255,255,255,0.10); stroke-width: 1; }
    .chart-axis-label { fill: rgba(245,245,245,0.62); font-size: 11px; }
    .chart-line { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .chart-line.pageviews { stroke: var(--gold-1); }
    .chart-line.downloads { stroke: var(--green); }
    .chart-dot { stroke: #050505; stroke-width: 2; }
    .chart-dot.pageviews { fill: var(--gold-1); }
    .chart-dot.downloads { fill: var(--green); }
    .chart-empty { color: var(--muted); padding: 24px 0; text-align: center; }

    .chart-legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .legend-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      margin-right: 6px;
    }

    @media (max-width: 620px) {
      .kpi-grid { grid-template-columns: 1fr; }
      .traffic-chart { height: 220px; }
    }
  </style>

</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img src="../creatorrr-logo-nolink.png" alt="Creatorrr logo" />
        <span>Founder Dashboard</span>
      </div>
      <div class="top-actions">
        <a class="btn secondary" href="../account.html">Account</a>
        <button class="btn primary" id="refresh-btn" type="button">Refresh</button>
      </div>
    </div>

    <section class="card">
      <div id="status" class="status muted">Checking access...</div>
    </section>

    <section class="card">
      <h2 style="margin-top:0;">Revenue & Growth Snapshot</h2>
      <div class="kpi-grid" id="kpi-grid"></div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2 id="traffic-title">Traffic (last 30 days)</h2>
        <div class="range-tabs" aria-label="Traffic date range">
          <button class="range-tab" type="button" data-window="all">All</button>
          <button class="range-tab active" type="button" data-window="30">30 days</button>
          <button class="range-tab" type="button" data-window="7">7 days</button>
        </div>
      </div>
      <div class="kpi-grid" id="traffic-grid"></div>
      <div class="chart-card" aria-label="Traffic by day">
        <div class="chart-head">
          <span>Daily trend</span>
          <span id="chart-summary">Loading...</span>
        </div>
        <div id="traffic-chart"></div>
        <div class="chart-legend">
          <span><i class="legend-dot" style="background: var(--gold-1);"></i>Pageviews</span>
          <span><i class="legend-dot" style="background: var(--green);"></i>Downloads</span>
        </div>
      </div>
      <div style="display:grid; gap:12px; margin-top:12px;">
        <div>
          <h3 style="margin:0 0 8px 0;">Top countries</h3>
          <div class="muted" id="countries-list" style="white-space: pre-line;">Loading...</div>
        </div>
        <div>
          <h3 style="margin:0 0 8px 0;">Top pages</h3>
          <div class="muted" id="pages-list" style="white-space: pre-line;">Loading...</div>
        </div>
        <div>
          <h3 style="margin:0 0 8px 0;" id="downloads-title">Downloads (last 30 days)</h3>
          <div class="muted" id="downloads-list" style="white-space: pre-line;">Loading...</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const LS_WEB_TOKEN = "creatorrr.web.auth.token.v1";
    const API_BASE = "https://api.creatorrr.com";

    const statusEl = document.getElementById("status");
    const gridEl = document.getElementById("kpi-grid");
    const trafficGridEl = document.getElementById("traffic-grid");
    const trafficTitleEl = document.getElementById("traffic-title");
    const downloadsTitleEl = document.getElementById("downloads-title");
    const trafficChartEl = document.getElementById("traffic-chart");
    const chartSummaryEl = document.getElementById("chart-summary");
    const rangeTabs = Array.from(document.querySelectorAll(".range-tab"));
    const countriesListEl = document.getElementById("countries-list");
    const pagesListEl = document.getElementById("pages-list");
    const downloadsListEl = document.getElementById("downloads-list");
    const refreshBtn = document.getElementById("refresh-btn");
    let selectedTrafficWindow = "30";

    function getToken() {
      try {
        return window.localStorage.getItem(LS_WEB_TOKEN) || "";
      } catch {
        return "";
      }
    }

    function fmtNumber(n) {
      const value = Number(n || 0);
      return Number.isFinite(value) ? new Intl.NumberFormat("en-US").format(value) : "0";
    }

    function fmtMoney(n) {
      const value = Number(n || 0);
      return Number.isFinite(value)
        ? new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(value)
        : "$0";
    }

    function fmtPercent(n) {
      const value = Number(n || 0);
      return Number.isFinite(value)
        ? `${(value * 100).toFixed(1)}%`
        : "0%";
    }

    function tile(label, value) {
      const node = document.createElement("div");
      node.className = "kpi";
      node.innerHTML = `<div class="kpi-label">${label}</div><div class="kpi-value">${value}</div>`;
      return node;
    }

    function makePairsList(rows, keyLabel) {
      if (!Array.isArray(rows) || rows.length === 0) return "No data yet.";
      return rows
        .map((row) => `${row[keyLabel]}: ${fmtNumber(row.visits)}`)
        .join("\n");
    }

    function makeDownloadList(rows) {
      if (!Array.isArray(rows) || rows.length === 0) return "No data yet.";
      return rows
        .map((row) => `${row.item_id} v${row.item_version} (${row.item_variant}) [${row.country || "ZZ"}]: ${fmtNumber(row.downloads)}`)
        .join("\n");
    }

    function escapeXml(value) {
      return String(value).replace(/[&<>'"]/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&apos;",
        "\"": "&quot;",
      }[char]));
    }

    function updateRangeTabs() {
      rangeTabs.forEach((tab) => {
        const active = tab.dataset.window === selectedTrafficWindow;
        tab.classList.toggle("active", active);
        tab.setAttribute("aria-pressed", active ? "true" : "false");
      });
    }

    function renderTrafficChart(rows) {
      const daily = Array.isArray(rows) ? rows : [];
      if (daily.length === 0) {
        trafficChartEl.innerHTML = '<div class="chart-empty">No chart data yet.</div>';
        chartSummaryEl.textContent = "0 days";
        return;
      }

      const width = 900;
      const height = 260;
      const pad = { top: 18, right: 18, bottom: 34, left: 42 };
      const innerW = width - pad.left - pad.right;
      const innerH = height - pad.top - pad.bottom;
      const maxValue = Math.max(1, ...daily.flatMap((row) => [Number(row.pageviews || 0), Number(row.downloads || 0)]));
      const x = (idx) => pad.left + (daily.length === 1 ? innerW / 2 : (idx / (daily.length - 1)) * innerW);
      const y = (value) => pad.top + innerH - (Number(value || 0) / maxValue) * innerH;
      const pointsFor = (key) => daily.map((row, idx) => `${x(idx).toFixed(1)},${y(row[key]).toFixed(1)}`).join(" ");
      const yTicks = [0, Math.ceil(maxValue / 2), maxValue];
      const firstDay = daily[0]?.day || "";
      const lastDay = daily[daily.length - 1]?.day || "";
      const totalPageviews = daily.reduce((sum, row) => sum + Number(row.pageviews || 0), 0);
      const totalDownloads = daily.reduce((sum, row) => sum + Number(row.downloads || 0), 0);

      chartSummaryEl.textContent = `${daily.length} days · ${fmtNumber(totalPageviews)} pageviews · ${fmtNumber(totalDownloads)} downloads`;
      trafficChartEl.innerHTML = `
        <svg class="traffic-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="Daily pageviews and downloads from ${escapeXml(firstDay)} to ${escapeXml(lastDay)}">
          ${yTicks.map((tick) => `
            <line class="chart-grid-line" x1="${pad.left}" x2="${width - pad.right}" y1="${y(tick).toFixed(1)}" y2="${y(tick).toFixed(1)}"></line>
            <text class="chart-axis-label" x="${pad.left - 8}" y="${(y(tick) + 4).toFixed(1)}" text-anchor="end">${fmtNumber(tick)}</text>
          `).join("")}
          <polyline class="chart-line pageviews" points="${pointsFor("pageviews")}"></polyline>
          <polyline class="chart-line downloads" points="${pointsFor("downloads")}"></polyline>
          ${daily.map((row, idx) => `
            <circle class="chart-dot pageviews" cx="${x(idx).toFixed(1)}" cy="${y(row.pageviews).toFixed(1)}" r="4"><title>${escapeXml(row.day)} pageviews: ${fmtNumber(row.pageviews)}</title></circle>
            <circle class="chart-dot downloads" cx="${x(idx).toFixed(1)}" cy="${y(row.downloads).toFixed(1)}" r="4"><title>${escapeXml(row.day)} downloads: ${fmtNumber(row.downloads)}</title></circle>
          `).join("")}
          <text class="chart-axis-label" x="${pad.left}" y="${height - 8}">${escapeXml(firstDay)}</text>
          <text class="chart-axis-label" x="${width - pad.right}" y="${height - 8}" text-anchor="end">${escapeXml(lastDay)}</text>
        </svg>
      `;
    }

    async function loadDashboard() {
      const token = getToken();
      if (!token) {
        window.location.href = "../account.html?intent=login&next=%2Fdashboard%2F";
        return;
      }

      statusEl.className = "status muted";
      statusEl.textContent = "Loading founder metrics...";

      try {
        const overviewEndpoint = `${API_BASE}/dashboard/overview`;
        const overviewRes = await fetch(overviewEndpoint, {
          method: "GET",
          headers: { authorization: `Bearer ${token}` },
        });
        const data = await overviewRes.json().catch(() => null);

        updateRangeTabs();
        const trafficEndpoint = `${API_BASE}/dashboard/traffic?window=${encodeURIComponent(selectedTrafficWindow)}`;
        const trafficRes = await fetch(trafficEndpoint, {
          method: "GET",
          headers: { authorization: `Bearer ${token}` },
        });
        const traffic = await trafficRes.json().catch(() => null);

        if (overviewRes.status === 404) {
          throw new Error(`dashboard_api_not_found:${overviewEndpoint}`);
        }
        if (!overviewRes.ok || !data?.ok) {
          throw new Error(data?.error || `request_failed_${overviewRes.status}`);
        }
        if (!trafficRes.ok || !traffic?.ok) {
          throw new Error(traffic?.error || `request_failed_${trafficRes.status}`);
        }

        const m = data.metrics || {};
        gridEl.innerHTML = "";
        gridEl.append(
          tile("Estimated MRR", fmtMoney(m.estimated_mrr_usd)),
          tile("Paying Subscribers", fmtNumber(m.paying_subscribers)),
          tile("New Users (7d)", fmtNumber(m.new_users_last_7_days)),
          tile("Verification Rate", fmtPercent(m.verification_rate)),
          tile("Total Users", fmtNumber(m.total_users)),
          tile("Verified Users", fmtNumber(m.verified_users)),
          tile("Free Pass", fmtNumber(m.free_pass_users)),
          tile("Canceling", fmtNumber(m.canceling_users)),
          tile("Payment Risk", fmtNumber(m.payment_risk_users)),
          tile("Monthly Subs", fmtNumber(m.month_subscribers)),
          tile("Yearly Subs", fmtNumber(m.year_subscribers)),
          tile("Owner Access", data.owner_email || "-")
        );

        const t = traffic.totals || {};
        const windowLabel = traffic.window_label || "Last 30 days";
        trafficTitleEl.textContent = `Traffic (${windowLabel.toLowerCase()})`;
        downloadsTitleEl.textContent = `Downloads (${windowLabel.toLowerCase()})`;
        trafficGridEl.innerHTML = "";
        trafficGridEl.append(
          tile("Pageviews", fmtNumber(t.pageviews)),
          tile("Unique Visitors", fmtNumber(t.unique_visitors)),
          tile("Human Visits", fmtNumber(t.human_pageviews)),
          tile("Bot Visits", fmtNumber(t.bot_pageviews)),
          tile("Downloads", fmtNumber(t.downloads))
        );

        renderTrafficChart(traffic.daily || []);
        countriesListEl.textContent = makePairsList(traffic.countries || [], "country");
        pagesListEl.textContent = makePairsList(traffic.top_pages || [], "path");
        downloadsListEl.textContent = makeDownloadList(traffic.downloads || []);

        const generatedAt = data.generated_at ? new Date(data.generated_at).toLocaleString() : "now";
        statusEl.className = "status ok";
        statusEl.textContent = `Private founder view active. Last refresh: ${generatedAt}`;
      } catch (err) {
        if (String(err instanceof Error ? err.message : "").includes("access_denied")) {
          window.location.href = "../account.html?intent=login&dashboard=forbidden";
          return;
        }
        statusEl.className = "status err";
        const msg = err instanceof Error ? err.message : "unknown_error";
        const missingPrefix = "dashboard_api_not_found:";
        statusEl.textContent = msg.startsWith(missingPrefix)
          ? `Dashboard API returned 404 on: ${msg.slice(missingPrefix.length)}`
          : `Access denied or data unavailable.\n${msg}`;
        gridEl.innerHTML = "";
        trafficGridEl.innerHTML = "";
        countriesListEl.textContent = "Unavailable";
        pagesListEl.textContent = "Unavailable";
        downloadsListEl.textContent = "Unavailable";
        trafficChartEl.innerHTML = '<div class="chart-empty">Unavailable</div>';
        chartSummaryEl.textContent = "Unavailable";
      }
    }

    rangeTabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        selectedTrafficWindow = tab.dataset.window || "30";
        loadDashboard();
      });
    });

    refreshBtn.addEventListener("click", loadDashboard);
    loadDashboard();
  </script>
</body>
</html>
