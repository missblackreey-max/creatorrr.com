<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MV8HQZJYQV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-MV8HQZJYQV', { send_page_view: false });
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email | Contentorrr</title>
  <link rel="icon" type="image/png" href="./creatorrr-logo-nolink.png" sizes="790x790" />
  <link rel="apple-touch-icon" href="./creatorrr-logo-nolink.png" />
  <style>
    :root {
      --bg: #060606;
      --panel: rgba(255, 255, 255, 0.05);
      --panel-strong: rgba(255, 255, 255, 0.08);
      --text: #f5f5f5;
      --muted: rgba(245, 245, 245, 0.74);
      --line: rgba(255, 255, 255, 0.12);
      --gold-1: #f7d56a;
      --gold-2: #b8892a;
      --green: #7aeaa0;
      --green-deep: #49b66f;
      --red: #ff9a9a;
      --red-deep: #ff6666;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.42);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; scroll-padding-top: 96px; background:#000000;}

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(1000px 620px at 82% -10%, rgba(247, 213, 106, 0.08), transparent 60%),
        radial-gradient(900px 520px at 8% 0%, rgba(184, 137, 42, 0.08), transparent 55%),
        linear-gradient(180deg, #050505 0%, #080808 35%, #050505 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .wrap {
      width: min(100%, 620px);
    }

    .card {
      position: relative;
      overflow: hidden;
      padding: 32px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      box-shadow: var(--shadow);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -1px auto auto -1px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(247, 213, 106, 0.16), transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      color: rgba(247, 213, 106, 0.95);
      font-size: 12px;
      font-weight: 760;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 7vw, 48px);
      line-height: 0.98;
      letter-spacing: -1.3px;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .status-box {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-top: 24px;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid rgba(247, 213, 106, 0.24);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }

    .status-box::before {
      content: "…";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      flex: 0 0 auto;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      color: #0b0b0b;
      background: linear-gradient(180deg, rgba(247, 213, 106, 0.98), rgba(184, 137, 42, 0.95));
    }

    .status-box.ok {
      border-color: rgba(122, 234, 160, 0.26);
      background: rgba(73, 182, 111, 0.12);
      color: #e5ffee;
    }

    .status-box.ok::before {
      content: "✓";
      color: #06250f;
      background: linear-gradient(180deg, var(--green), var(--green-deep));
    }

    .status-box.err {
      border-color: rgba(255, 154, 154, 0.24);
      background: rgba(255, 102, 102, 0.12);
      color: #ffe4e4;
    }

    .status-box.err::before {
      content: "!";
      color: #3b0505;
      background: linear-gradient(180deg, var(--red), var(--red-deep));
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid transparent;
      color: var(--text);
      background: transparent;
      font-size: 14px;
      font-weight: 760;
      text-decoration: none;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      color: #0b0b0b;
      background: linear-gradient(180deg, var(--gold-1), var(--gold-2));
      box-shadow: 0 14px 30px rgba(184, 137, 42, 0.20);
    }

    .btn-secondary {
      border-color: rgba(255, 255, 255, 0.16);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    }

    .helper {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(245, 245, 245, 0.6);
    }

    @media (max-width: 640px) {
      .card { padding: 24px; }
      .actions { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
  <script src="/analytics.js" defer></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="eyebrow">Creatorrr account</div>
      <h1>Email verification</h1>
      <p>Confirm your email once, then continue signing in on the account page.</p>
      <div class="status-box" id="status">Verifying your email…</div>
      <div class="actions">
        <a class="btn btn-primary" href="/account.html?intent=login">Go to login</a>
        <a class="btn btn-secondary" href="/">Back to home</a>
      </div>
      <p class="helper">If this link has expired, request a fresh verification email from the login screen.</p>
    </div>
  </div>

  <script>
    const API_BASE = "https://api.creatorrr.com";
    const VERIFIED_SESSION_KEY = "creatorrr.web.verify_email.success.v1";
    const statusEl = document.getElementById("status");
    const params = new URLSearchParams(window.location.search);
    const token = String(params.get("token") || "").trim();

    if (token) {
      const cleanParams = new URLSearchParams(window.location.search);
      cleanParams.delete("token");
      const qs = cleanParams.toString();
      history.replaceState(null, "", window.location.pathname + (qs ? `?${qs}` : ""));
    }

    function sendSanitizedGaPageView() {
      if (typeof window.gtag !== "function") return;
      const pagePath = window.location.pathname || "/verify-email.html";
      const pageLocation = `${window.location.origin}${pagePath}`;
      window.gtag("event", "page_view", {
        page_path: pagePath,
        page_location: pageLocation,
        page_title: document.title || "Verify Email | Contentorrr",
      });
    }

    sendSanitizedGaPageView();

    function setStatus(message, state = "") {
      statusEl.className = "status-box" + (state ? ` ${state}` : "");
      statusEl.textContent = message;
    }

    async function verify() {
      if (!token) {
        if (sessionStorage.getItem(VERIFIED_SESSION_KEY) === "1") {
          setStatus("Your email has already been verified. You can now log in.", "ok");
          return;
        }
        setStatus("This verification link is invalid. Please request a new email from the login screen.", "err");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/auth/verify-email`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ token })
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          const err = String(data?.error || "verify_failed");
          throw new Error(err);
        }

        sessionStorage.setItem(VERIFIED_SESSION_KEY, "1");
        setStatus("Your email has been verified. You can now log in.", "ok");
      } catch (err) {
        const msg = err instanceof Error ? err.message : "verify_failed";
        if (msg.includes("invalid_or_expired_verify_token")) {
          setStatus("This verification link is invalid or expired. Please request a new verification email.", "err");
        } else {
          setStatus("Could not verify your email right now. Please try again.", "err");
        }
      }
    }

    verify();
  </script>
</body>
</html>
