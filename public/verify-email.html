<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email | Contentorrr</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #080808; color: #f5f5f5; }
    .wrap { max-width: 600px; margin: 80px auto; padding: 24px; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; }
    h1 { margin-top: 0; }
    p { color: rgba(245,245,245,0.8); line-height: 1.5; }
    .ok { color: #5fcf8a; }
    .err { color: #ff7d7d; }
    a { color: #f7d56a; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Email verification</h1>
      <p id="status">Verifying your email…</p>
      <p><a href="/account.html?intent=login">Go to login</a></p>
    </div>
  </div>

  <script>
    const API_BASE = "https://api.creatorrr.com";
    const statusEl = document.getElementById("status");
    const params = new URLSearchParams(window.location.search);
    const token = String(params.get("token") || "").trim();

    async function verify() {
      if (!token) {
        statusEl.className = "err";
        statusEl.textContent = "This verification link is invalid. Please request a new email from the login screen.";
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/auth/verify-email`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ token })
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          const err = String(data?.error || "verify_failed");
          throw new Error(err);
        }

        statusEl.className = "ok";
        statusEl.textContent = "Your email has been verified. You can now log in.";
      } catch (err) {
        const msg = err instanceof Error ? err.message : "verify_failed";
        statusEl.className = "err";
        if (msg.includes("invalid_or_expired_verify_token")) {
          statusEl.textContent = "This verification link is invalid or expired. Please request a new verification email.";
        } else {
          statusEl.textContent = "Could not verify your email right now. Please try again.";
        }
      }
    }

    verify();
  </script>
</body>
</html>
